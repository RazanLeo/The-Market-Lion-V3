name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - working-directory: market-lion
        run: npm ci
      - working-directory: market-lion
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/marketlion"
        run: npx prisma generate
      - working-directory: market-lion
        run: npm run build
